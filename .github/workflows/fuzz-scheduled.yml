name: Scheduled Deep Fuzz

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Mondays at 3 AM UTC
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  list-targets:
    name: Discover fuzz targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Collect targets
        id: collect
        run: |
          set -euo pipefail
          matrix=$(
            for crate in validation filter fieldfilter; do
              while IFS= read -r target; do
                jq -nc --arg c "$crate" --arg t "$target" \
                  '{crate: $c, target: $t}'
              done < <(cd "crates/$crate" && cargo fuzz list)
            done | jq -sc .
          )
          if [ "$matrix" = "[]" ]; then
            echo "::error::No fuzz targets discovered — refusing to publish empty matrix"
            exit 1
          fi
          echo "Discovered matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  fuzz:
    name: Deep fuzz ${{ matrix.crate }}/${{ matrix.target }}
    needs: list-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}

      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: crates/${{ matrix.crate }}/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.crate }}-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.crate }}-${{ matrix.target }}-

      - name: Run deep fuzz
        working-directory: crates/${{ matrix.crate }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=1800

      - name: Save fuzz corpus
        if: always()
        uses: actions/cache/save@v4
        with:
          path: crates/${{ matrix.crate }}/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.crate }}-${{ matrix.target }}-${{ github.sha }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.crate }}-${{ matrix.target }}
          path: |
            crates/${{ matrix.crate }}/fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30
